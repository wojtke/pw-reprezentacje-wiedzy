# Lint config — enforces architectural rules from DESIGN_go.md §2 (point 1).
#
# Sum-type exhaustiveness (//go-sumtype:decl Statement / Formula / Query)
# is NOT a built-in golangci-lint linter; run `make sumtype` separately
# (target shells out to `BurntSushi/go-sumtype`). See DESIGN_go.md §1.2.

run:
  timeout: 3m
  go: "1.22"

linters:
  disable-all: true
  enable:
    - depguard       # architecture: keep core pure-Go, frontends behind facade
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - goimports      # subsumes gofmt

linters-settings:
  depguard:
    rules:
      core-pure:
        list-mode: lax
        files:
          - "**/internal/core/**/*.go"
        deny:
          - pkg: "fyne.io"
            desc: "internal/core must stay UI-free (DESIGN_go.md §2 rule 1)"
          - pkg: "net/http"
            desc: "internal/core must not know about HTTP (DESIGN_go.md §2 rule 1)"
          - pkg: "embed"
            desc: "internal/core must not embed assets (DESIGN_go.md §2 rule 1)"

      frontends-via-facade:
        list-mode: lax
        files:
          - "**/cmd/ds4/**/*.go"
          - "**/cmd/ds4-web/**/*.go"
        deny:
          # Glob covers all subpackages: model, engine, parser, ...
          - pkg: "ds4/internal/core"
            desc: "frontends talk to the core only through internal/api (DESIGN_go.md §2 rule 4)"
          - pkg: "ds4/internal/core/**"
            desc: "frontends talk to the core only through internal/api (DESIGN_go.md §2 rule 4)"
