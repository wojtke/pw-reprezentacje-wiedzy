<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>DS4 Reasoner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>DS4 Reasoner</h1>
    <nav>
      <select id="examples-menu" aria-label="Przykłady">
        <option value="">— Przykłady —</option>
      </select>
    </nav>
  </header>

  <main>
    <section class="pane">
      <label for="domain">Dziedzina</label>
      <textarea id="domain" spellcheck="false" placeholder="// opis dziedziny..."></textarea>
    </section>

    <section class="pane">
      <div class="row">
        <label for="query">Kwerenda</label>
        <button id="solve">▶ Oblicz</button>
      </div>
      <textarea id="query" spellcheck="false" placeholder="// kwerenda..."></textarea>

      <div id="result">
        <p class="placeholder">Wynik pojawi się tutaj.</p>
      </div>
    </section>
  </main>

  <footer id="status">
    <span id="status-text">gotowy</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
